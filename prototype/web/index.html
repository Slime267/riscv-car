<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>RISC-V 遥控小车</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0f0f23;color:#ccc;font-family:system-ui;display:flex;flex-direction:column;
       align-items:center;height:100dvh;touch-action:none;overflow:hidden;
       user-select:none;-webkit-user-select:none}
  h2{margin:12px 0 4px;font-size:18px}
  #status{font-size:12px;margin-bottom:8px;padding:4px 14px;border-radius:12px;background:#1a1a3e}
  #status.ok{color:#0f0}
  button{padding:12px 40px;font-size:16px;border:none;border-radius:25px;margin:6px 0;cursor:pointer}
  #btnConnect{background:#e94560;color:#fff}
  #btnConnect.connected{background:#0a8;color:#fff}
  #btnTilt{background:#333;color:#ccc;font-size:14px;padding:8px 20px}
  #btnTilt.active{background:#e94560;color:#fff}
  #dpad{display:grid;grid-template-columns:70px 70px 70px;grid-template-rows:70px 70px 70px;
         gap:4px;margin:12px 0}
  .btn{background:#1a1a3e;border:2px solid #2a2a5e;border-radius:14px;
       font-size:30px;display:flex;align-items:center;justify-content:center;cursor:pointer}
  .btn:active,.btn.pressed{background:#e94560;border-color:#ff6b81}
  .empty{visibility:hidden}
  #stop{background:#333;border-color:#555}
  label{font-size:13px;margin-top:8px}
  input[type=range]{width:85%;margin:4px 0 12px;accent-color:#e94560}
  .telemetry{display:flex;gap:16px;font-size:13px;margin:4px 0;color:#aaa}
  .telemetry span{background:#1a1a3e;padding:3px 10px;border-radius:8px}
  .info{font-size:12px;color:#888;margin-top:4px}
  #tiltHint{font-size:12px;color:#e94560;margin:4px 0}
</style>
</head>
<body>

<h2>RISC-V 遥控小车</h2>
<div id="status">未连接</div>
<button id="btnConnect" onclick="toggleBLE()">连接小车</button>

<div id="tiltHint" style="display:none">手机前倾=前进 / 左倾=左转 / 放平=停止</div>
<button id="btnTilt" onclick="toggleTilt()">体感模式：关</button>

<input type="range" id="speed" min="5" max="30" value="20" oninput="updateLabel()">
<label>速度: <span id="lbl">20</span>%</label>

<div id="dpad">
  <div class="empty"></div>
  <div class="btn" id="btnFwd">▲</div>
  <div class="empty"></div>
  <div class="btn" id="btnLeft">◀</div>
  <div class="btn" id="stop">■</div>
  <div class="btn" id="btnRight">▶</div>
  <div class="empty"></div>
  <div class="btn" id="btnBack">▼</div>
  <div class="empty"></div>
</div>

<div class="telemetry">
  <span>L:<span id="spdL">0</span>% R:<span id="spdR">0</span>%</span>
  <span>🔋 <span id="bat">--</span>%</span>
</div>

<div class="info">Chrome/Edge | ESP32-C3 RISC-V</div>

<script>
let dev, charCtrl, charStatus, spd = 0.2, led = 0, tiltOn = false;
let lastL = 0, lastR = 0;

document.getElementById('speed').value = 20;
updateLabel();

function updateLabel(){
  spd = document.getElementById('speed').value / 100;
  document.getElementById('lbl').textContent = Math.round(spd*100);
}
function setStatus(t,s){let e=document.getElementById('status');e.textContent=t;e.className=s||''}

// ---- BLE ----
async function toggleBLE(){
  if(dev && dev.gatt.connected){dev.gatt.disconnect();return}
  try{
    setStatus('扫描中...');
    dev = await navigator.bluetooth.requestDevice({
      filters:[{name:'RISC-V Car'}],
      optionalServices:['0000ffe0-0000-1000-8000-00805f9b34fb']
    });
    dev.addEventListener('gattserverdisconnected',()=>{
      setStatus('已断开');document.getElementById('btnConnect').textContent='连接小车';
      document.getElementById('btnConnect').classList.remove('connected');
    });
    let srv = await dev.gatt.connect();
    let svc = await srv.getPrimaryService('0000ffe0-0000-1000-8000-00805f9b34fb');
    charCtrl = await svc.getCharacteristic('0000ffe1-0000-1000-8000-00805f9b34fb');
    charStatus = await svc.getCharacteristic('0000ffe2-0000-1000-8000-00805f9b34fb');
    await charStatus.startNotifications();
    charStatus.addEventListener('characteristicvaluechanged', e => {
      let d = new Uint8Array(e.target.value.buffer);
      document.getElementById('spdL').textContent = d[0];
      document.getElementById('spdR').textContent = d[1];
      document.getElementById('bat').textContent = d[2];
    });
    setStatus('已连接','ok');
    document.getElementById('btnConnect').textContent='断开连接';
    document.getElementById('btnConnect').classList.add('connected');
  }catch(e){
    setStatus('连接失败:'+e.message);console.error(e)
  }
}

// ---- 发送 ----
function send(l,r,extra){
  if(!charCtrl)return;
  if(l===lastL && r===lastR)return;  // 去重
  lastL=l; lastR=r;
  let a=new Uint8Array([l,r,extra||0]);
  charCtrl.writeValueWithoutResponse(a).catch(()=>{})
}
function cmd(l,r){
  let s=Math.round(spd*127);
  if(l>0)l=s;else if(l<0)l=-s;
  if(r>0)r=s;else if(r<0)r=-s;
  send(l,r);
}

// ---- 按键 ----
function bind(id, l, r){
  let el=document.getElementById(id);
  el.addEventListener('pointerdown',e=>{e.preventDefault();cmd(l,r);el.classList.add('pressed')});
  el.addEventListener('pointerup',  e=>{e.preventDefault();cmd(0,0);el.classList.remove('pressed')});
  el.addEventListener('pointerleave',e=>{cmd(0,0);el.classList.remove('pressed')});
}
bind('btnFwd',   1,  1);
bind('btnBack', -1, -1);
bind('btnLeft',  1, -1);
bind('btnRight',-1,  1);
bind('stop',     0,  0);

function toggleLED(){led^=1;send(0,0,led)}

// ---- 体感 ----
function toggleTilt(){
  tiltOn = !tiltOn;
  let btn = document.getElementById('btnTilt');
  let hint = document.getElementById('tiltHint');
  if(tiltOn){
    if(typeof DeviceOrientationEvent !== 'undefined' &&
       typeof DeviceOrientationEvent.requestPermission === 'function'){
      // iOS: 需要用户手势触发权限请求
      DeviceOrientationEvent.requestPermission()
        .then(r => {
          if(r==='granted'){startTilt(); btn.textContent='体感模式：开'; btn.classList.add('active');
                             hint.style.display='block'; }
          else {tiltOn=false; alert('需要授权体感')}
        })
        .catch(()=>{tiltOn=false;alert('体感不支持')});
    } else {
      // Android: 直接监听
      startTilt();
      btn.textContent='体感模式：开';
      btn.classList.add('active');
      hint.style.display='block';
    }
  } else {
    stopTilt();
    btn.textContent='体感模式：关';
    btn.classList.remove('active');
    hint.style.display='none';
    cmd(0,0);
  }
}

function startTilt(){
  window.addEventListener('deviceorientation', onTilt);
}
function stopTilt(){
  window.removeEventListener('deviceorientation', onTilt);
}

function onTilt(e){
  if(!tiltOn || !charCtrl)return;
  let beta  = e.beta  || 0;   // 前后倾: 前倾 +
  let gamma = e.gamma || 0;   // 左右倾: 右倾 +
  let T = 10;  // 死区 10 度

  let l=0, r=0;
  if(beta > T){ l=1; r=1; }      // 前倾 → 前进
  else if(beta < -T){ l=-1; r=-1; }  // 后倾 → 后退
  else if(gamma < -T){ l=1; r=-1; }  // 左倾 → 左转
  else if(gamma > T){ l=-1; r=1; }   // 右倾 → 右转
  // 否则 l=0,r=0 → 停止

  cmd(l, r);
}
</script>
</body>
</html>
